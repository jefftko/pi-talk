<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>南溪 · SYSTEM ONLINE</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --green:       #00FF41;
  --green-dim:   rgba(0,255,65,0.15);
  --green-glow:  rgba(0,255,65,0.4);
  --cyan:        #00D2FF;
  --cyan-dim:    rgba(0,210,255,0.12);
  --red:         #FF4444;
  --amber:       #FFB020;
  --bg:          #000000;
  --bg2:         #050a05;
  --text:        #00FF41;
  --text-dim:    rgba(0,255,65,0.55);
  --text-ghost:  rgba(0,255,65,0.28);
  --font-mono:   'JetBrains Mono', 'Courier New', monospace;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  overflow: hidden;
}

/* ── MATRIX RAIN ── */
#matrix-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0.13;
  pointer-events: none;
  z-index: 0;
}

/* ── SCANLINE OVERLAY ── */
.scanlines {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 1;
}

/* ── CRT VIGNETTE ── */
.crt-vignette {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
  z-index: 1;
}

/* ── GLITCH FLASH ── */
.glitch-flash {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 3px;
  background: var(--green);
  opacity: 0;
  pointer-events: none;
  z-index: 10;
  animation: glitch-scan 8s infinite;
}
@keyframes glitch-scan {
  0%   { opacity: 0; top: 0; }
  5%   { opacity: 0.6; }
  10%  { opacity: 0; top: 100%; }
  100% { opacity: 0; top: 100%; }
}

/* ── HUD CORNERS ── */
.hud-corner {
  position: fixed;
  width: 24px; height: 24px;
  border-color: var(--green);
  border-style: solid;
  opacity: 0.5;
  z-index: 2;
}
.hud-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
.hud-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
.hud-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
.hud-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

/* ── LAYOUT ── */
#app {
  position: relative;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  z-index: 3;
  padding: 0 16px;
}

/* ── HEADER ── */
#header {
  flex: 0 0 auto;
  padding: 14px 0 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(0,255,65,0.2);
}
#sys-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  text-transform: uppercase;
}
#sys-label span { color: var(--green); }
#clock {
  font-size: 40px;
  font-weight: 200;
  letter-spacing: 0.04em;
  color: var(--green);
  text-shadow: 0 0 20px var(--green-glow);
  font-variant-numeric: tabular-nums;
}
#date-label {
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-align: right;
}

/* ── AVATAR ZONE ── */
#avatar-zone {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 0 12px;
  position: relative;
}

/* hexagon SVG wrapper */
#hex-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#hex-svg {
  position: absolute;
  top: 0; left: 0;
  width: 200px; height: 200px;
  animation: hex-rotate 60s linear infinite;
}
@keyframes hex-rotate {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

#avatar-circle {
  position: relative;
  width: 130px;
  height: 130px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
  filter: saturate(0.6) hue-rotate(90deg) brightness(1.1);
  box-shadow: 0 0 30px rgba(0,255,65,0.3);
}
#avatar-circle img {
  width: 100%; height: 100%;
  object-fit: cover;
}
/* scan light */
#avatar-circle::after {
  content: '';
  position: absolute;
  top: -100%; left: 0;
  width: 100%; height: 40%;
  background: linear-gradient(180deg, transparent, rgba(0,255,65,0.25), transparent);
  animation: scan-down 2.2s ease-in-out infinite;
}
@keyframes scan-down {
  0%   { top: -40%; }
  100% { top: 120%; }
}

#status-label {
  margin-top: 12px;
  font-size: 13px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
}
#status-label::after {
  content: '_';
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── DATA PANELS ── */
#data-panels {
  flex: 0 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 4px 0 8px;
}

.panel {
  background: rgba(0,255,65,0.04);
  border: 1px solid rgba(0,255,65,0.18);
  border-radius: 4px;
  padding: 8px 10px;
}
.panel-title {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-ghost);
  text-transform: uppercase;
  margin-bottom: 6px;
  border-bottom: 1px solid rgba(0,255,65,0.1);
  padding-bottom: 4px;
}
.panel-row {
  font-size: 11px;
  color: var(--text-dim);
  line-height: 1.7;
  white-space: nowrap;
}
.panel-row .val {
  color: var(--green);
  font-weight: 600;
}
.panel-row .val.cyan { color: var(--cyan); }
.panel-row .val.amber { color: var(--amber); }

/* ASCII bar */
.ascii-bar {
  display: inline-block;
  font-size: 10px;
  letter-spacing: -0.05em;
  color: var(--green-dim);
}
.ascii-bar .fill { color: var(--green); }

/* ── DIALOGUE ── */
#dialogue-zone {
  flex: 1 1 auto;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 4px 0;
  min-height: 0;
}
.bubble {
  font-size: 13px;
  line-height: 1.6;
  padding: 6px 10px;
  margin-bottom: 5px;
  border-radius: 2px;
  max-width: 92%;
  animation: bubble-in 0.3s ease-out;
}
@keyframes bubble-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bubble.ai {
  background: rgba(0,255,65,0.06);
  border-left: 2px solid var(--green);
  color: var(--text);
  align-self: flex-start;
}
.bubble.ai::before {
  content: '> ';
  color: var(--green);
  font-weight: 700;
}
.bubble.user {
  background: rgba(0,210,255,0.06);
  border-right: 2px solid var(--cyan);
  color: rgba(0,210,255,0.85);
  align-self: flex-end;
  text-align: right;
}
.bubble.user::before {
  content: '$ ';
  color: var(--cyan);
  font-weight: 700;
}

/* ── RECORD BAR ── */
#record-bar {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 0 8px;
  border-top: 1px solid rgba(0,255,65,0.12);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--text-ghost);
  text-transform: uppercase;
  user-select: none;
  transition: color 0.15s;
}
#record-bar.active {
  color: var(--red);
}
#space-key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 60px; height: 22px;
  border: 1.5px solid rgba(0,255,65,0.3);
  border-radius: 4px;
  font-size: 9px;
  letter-spacing: 0.15em;
  color: var(--text-ghost);
  background: rgba(0,255,65,0.04);
  transition: all 0.15s;
}
#record-bar.active #space-key {
  border-color: var(--red);
  box-shadow: 0 0 12px rgba(255,68,68,0.5);
  color: var(--red);
}
#rec-dot {
  display: none;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 0.8s step-end infinite;
}
#record-bar.active #rec-dot { display: inline-block; }

/* ── FOOTER ── */
#footer {
  flex: 0 0 auto;
  padding: 6px 0 10px;
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--text-ghost);
  text-transform: uppercase;
  border-top: 1px solid rgba(0,255,65,0.08);
}
</style>
</head>
<body>

<!-- Matrix Rain -->
<canvas id="matrix-canvas"></canvas>
<div class="scanlines"></div>
<div class="crt-vignette"></div>
<div class="glitch-flash"></div>
<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<div id="app">
  <!-- HEADER -->
  <div id="header">
    <div id="sys-label">NANHARA.AI &nbsp;|&nbsp; <span id="sys-status">ONLINE</span></div>
    <div id="clock">--:--:--</div>
    <div id="date-label" id="date-display">----.--.--<br>---</div>
  </div>

  <!-- AVATAR -->
  <div id="avatar-zone">
    <div id="hex-wrap">
      <svg id="hex-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- outer hex -->
        <polygon points="100,8 183,54 183,146 100,192 17,146 17,54"
          stroke="#00FF41" stroke-width="1.5" stroke-opacity="0.6" fill="none"/>
        <!-- inner hex -->
        <polygon points="100,22 169,63 169,137 100,178 31,137 31,63"
          stroke="#00FF41" stroke-width="0.8" stroke-opacity="0.25" fill="none"/>
        <!-- corner marks -->
        <circle cx="100" cy="8" r="3" fill="#00FF41" opacity="0.8"/>
        <circle cx="183" cy="54" r="3" fill="#00FF41" opacity="0.8"/>
        <circle cx="183" cy="146" r="3" fill="#00FF41" opacity="0.8"/>
        <circle cx="100" cy="192" r="3" fill="#00FF41" opacity="0.8"/>
        <circle cx="17" cy="146" r="3" fill="#00FF41" opacity="0.8"/>
        <circle cx="17" cy="54" r="3" fill="#00FF41" opacity="0.8"/>
        <!-- animated traveling dot -->
        <circle r="4" fill="#00FF41" opacity="0.9">
          <animateMotion dur="6s" repeatCount="indefinite"
            path="M100,8 L183,54 L183,146 L100,192 L17,146 L17,54 Z"/>
        </circle>
        <!-- data arc top-right -->
        <path d="M140,20 A80,80 0 0,1 180,80" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4" fill="none"/>
        <!-- data arc bottom-left -->
        <path d="M60,180 A80,80 0 0,1 20,120" stroke="#00D2FF" stroke-width="1" stroke-opacity="0.4" fill="none"/>
      </svg>
      <div id="avatar-circle">
        <img src="/avatar.jpg" alt="南溪" onerror="this.style.display='none';this.parentElement.style.background='#050a05'">
      </div>
    </div>
    <div id="status-label">IDLE</div>
  </div>

  <!-- DATA PANELS -->
  <div id="data-panels">
    <!-- Agent Status -->
    <div class="panel" id="panel-agents">
      <div class="panel-title">// AGENTS</div>
      <div class="panel-row" id="agents-list">
        <span class="val">LOADING...</span>
      </div>
    </div>
    <!-- System Resources -->
    <div class="panel" id="panel-sys">
      <div class="panel-title">// SYSTEM</div>
      <div class="panel-row" id="sys-cpu">CPU <span class="val" id="cpu-val">--</span>%</div>
      <div class="panel-row" id="sys-mem">MEM <span class="val" id="mem-val">--</span>%</div>
      <div class="panel-row" id="sys-tmp">TMP <span class="val amber" id="tmp-val">--</span>°C</div>
    </div>
    <!-- Finance -->
    <div class="panel" id="panel-finance">
      <div class="panel-title">// FINANCE</div>
      <div class="panel-row">MRR <span class="val cyan" id="mrr-val">¥----</span></div>
      <div class="panel-row">BAL <span class="val amber" id="bal-val">¥----</span></div>
    </div>
    <!-- App Stats -->
    <div class="panel" id="panel-app">
      <div class="panel-title">// APP_STATS</div>
      <div class="panel-row">DAU <span class="val" id="dau-val">--</span></div>
      <div class="panel-row">NEW <span class="val cyan" id="new-val">+--</span></div>
      <div class="panel-row">REV <span class="val" id="rev-val">--</span></div>
    </div>
  </div>

  <!-- DIALOGUE -->
  <div id="dialogue-zone">
    <div class="bubble ai" id="init-bubble">SYSTEM INITIALIZED. AWAITING INPUT.</div>
  </div>

  <!-- RECORD BAR -->
  <div id="record-bar">
    <div id="space-key">SPACE</div>
    <span id="rec-label">HOLD TO SPEAK</span>
    <div id="rec-dot"></div>
  </div>

  <!-- FOOTER -->
  <div id="footer">
    <span>NANHARA v3.0</span>
    <span id="uptime-label">UP: 00:00:00</span>
    <span id="footer-ip">192.168.3.x</span>
  </div>
</div>

<script>
// ═══════════════ MATRIX RAIN ═══════════════
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
let drops = [];

function initMatrix() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 16);
  drops = Array(cols).fill(1);
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00FF41';
  ctx.font = '14px monospace';
  drops.forEach((y, i) => {
    const char = String.fromCharCode(0x30A0 + Math.random() * 96);
    ctx.fillText(char, i * 16, y * 16);
    if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}

initMatrix();
window.addEventListener('resize', initMatrix);
let matrixFrame = 0;
function matrixLoop() {
  matrixFrame++;
  if (matrixFrame % 3 === 0) drawMatrix(); // ~20fps
  requestAnimationFrame(matrixLoop);
}
matrixLoop();

// ═══════════════ CLOCK ═══════════════
const clock = document.getElementById('clock');
const dateLbl = document.getElementById('date-label');
const weekdays = ['日','一','二','三','四','五','六'];
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  clock.textContent = `${h}:${m}:${s}`;
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  dateLbl.innerHTML = `${y}-${mo}-${d}<br>星期${weekdays[now.getDay()]}`;
}
setInterval(updateClock, 1000);
updateClock();

// ═══════════════ UPTIME ═══════════════
const startTime = Date.now();
setInterval(() => {
  const s = Math.floor((Date.now()-startTime)/1000);
  const hh = String(Math.floor(s/3600)).padStart(2,'0');
  const mm = String(Math.floor((s%3600)/60)).padStart(2,'0');
  const ss = String(s%60).padStart(2,'0');
  document.getElementById('uptime-label').textContent = `UP: ${hh}:${mm}:${ss}`;
}, 1000);

// ═══════════════ FINANCE DATA ═══════════════
async function fetchFinance() {
  try {
    const r = await fetch('http://192.168.3.80:3080/api/finance/summary', {signal: AbortSignal.timeout(5000)});
    if (!r.ok) return;
    const d = await r.json();
    if (d.mrr_cny != null) {
      document.getElementById('mrr-val').textContent = '¥' + Math.round(d.mrr_cny).toLocaleString();
    }
    if (d.ledger_balance != null) {
      document.getElementById('bal-val').textContent = '¥' + Math.round(d.ledger_balance).toLocaleString();
    }
  } catch(e) {}
}
fetchFinance();
setInterval(fetchFinance, 5*60*1000);

// ═══════════════ SYSTEM STATS (via Pi server) ═══════════════
async function fetchSysStats() {
  try {
    const r = await fetch('/api/sys-stats', {signal: AbortSignal.timeout(3000)});
    if (!r.ok) return;
    const d = await r.json();
    if (d.cpu != null) {
      const cpuPct = Math.round(d.cpu);
      document.getElementById('cpu-val').textContent = cpuPct;
      const bar = document.getElementById('sys-cpu');
      bar.innerHTML = `CPU <span class="val" id="cpu-val">${cpuPct}</span>% ${asciiBar(cpuPct)}`;
    }
    if (d.mem != null) {
      const memPct = Math.round(d.mem);
      document.getElementById('mem-val').textContent = memPct;
    }
    if (d.temp != null) {
      document.getElementById('tmp-val').textContent = Math.round(d.temp);
    }
  } catch(e) {}
}

function asciiBar(pct, len=8) {
  const fill = Math.round(pct/100*len);
  return '<span class="ascii-bar"><span class="fill">' + '▓'.repeat(fill) + '</span>' + '░'.repeat(len-fill) + '</span>';
}

fetchSysStats();
setInterval(fetchSysStats, 10*1000);

// ═══════════════ STATUS LABEL ═══════════════
const statusLabel = document.getElementById('status-label');
const hexSvg = document.getElementById('hex-svg');

function setStatus(s) {
  const labels = {idle:'IDLE', listening:'LISTENING', processing:'PROCESSING', speaking:'SPEAKING'};
  statusLabel.textContent = (labels[s] || s.toUpperCase());
  statusLabel.dataset.state = s;
  // hex color
  const polys = hexSvg.querySelectorAll('polygon');
  if (s === 'listening') {
    polys[0].style.stroke = '#FF4444';
    polys[0].style.animation = 'hex-rotate 2s linear infinite';
  } else if (s === 'speaking') {
    polys[0].style.stroke = '#00D2FF';
    polys[0].style.animation = 'hex-rotate 10s linear infinite';
  } else {
    polys[0].style.stroke = '#00FF41';
    polys[0].style.animation = 'hex-rotate 60s linear infinite';
  }
}
setStatus('idle');

// ═══════════════ DIALOGUE ═══════════════
const dialogueZone = document.getElementById('dialogue-zone');

function addBubble(text, role='ai') {
  const div = document.createElement('div');
  div.className = `bubble ${role}`;
  div.textContent = text;
  dialogueZone.appendChild(div);
  // keep max 4 bubbles
  while (dialogueZone.children.length > 4) {
    dialogueZone.removeChild(dialogueZone.firstChild);
  }
  dialogueZone.scrollTop = dialogueZone.scrollHeight;
}

// typewriter effect for AI
function typewriter(text, el, speed=28) {
  el.textContent = '';
  let i = 0;
  const t = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) clearInterval(t);
  }, speed);
}

// ═══════════════ RECORDING ═══════════════
const recordBar = document.getElementById('record-bar');
const recLabel = document.getElementById('rec-label');
let mediaRecorder, audioChunks = [];
let isRecording = false;

async function startRecording() {
  if (isRecording) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = sendAudio;
    mediaRecorder.start();
    isRecording = true;
    recordBar.classList.add('active');
    recLabel.textContent = 'RECORDING...';
    setStatus('listening');
  } catch(e) {
    recLabel.textContent = 'MIC_ERROR';
  }
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  isRecording = false;
  recordBar.classList.remove('active');
  recLabel.textContent = 'PROCESSING...';
  setStatus('processing');
}

async function sendAudio() {
  const blob = new Blob(audioChunks, {type: 'audio/webm'});
  const fd = new FormData();
  fd.append('audio', blob, 'input.webm');
  try {
    const r = await fetch('/api/transcribe', {method:'POST', body: fd});
    const d = await r.json();
    if (d.text) {
      addBubble(d.text, 'user');
      await sendChat(d.text);
    }
  } catch(e) {
    recLabel.textContent = 'HOLD TO SPEAK';
    setStatus('idle');
  }
  recLabel.textContent = 'HOLD TO SPEAK';
}

async function sendChat(text) {
  setStatus('processing');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: text})
    });
    const d = await r.json();
    const reply = d.reply || d.text || '...';
    setStatus('speaking');
    const bubble = document.createElement('div');
    bubble.className = 'bubble ai';
    dialogueZone.appendChild(bubble);
    while (dialogueZone.children.length > 4) dialogueZone.removeChild(dialogueZone.firstChild);
    typewriter(reply, bubble);
    setTimeout(() => setStatus('idle'), reply.length * 28 + 1000);
  } catch(e) {
    setStatus('idle');
  }
  recLabel.textContent = 'HOLD TO SPEAK';
}

// Space key
document.addEventListener('keydown', e => { if (e.code === 'Space' && !e.repeat) { e.preventDefault(); startRecording(); } });
document.addEventListener('keyup', e => { if (e.code === 'Space') { e.preventDefault(); stopRecording(); } });
recordBar.addEventListener('pointerdown', startRecording);
recordBar.addEventListener('pointerup', stopRecording);
recordBar.addEventListener('pointerleave', () => { if (isRecording) stopRecording(); });

// ═══════════════ AGENTS PANEL ═══════════════
async function fetchAgents() {
  try {
    const r = await fetch('http://192.168.3.80:3080/api/dashboard', {signal: AbortSignal.timeout(5000)});
    if (!r.ok) return;
    const d = await r.json();
    const agents = d.agents || [];
    const ul = document.getElementById('agents-list');
    if (!agents.length) return;
    ul.innerHTML = agents.slice(0,5).map(a => {
      const dot = a.status === 'active' ? '<span style="color:#00FF41">●</span>' : '<span style="color:rgba(0,255,65,0.3)">○</span>';
      const name = (a.name || a.id || '?').toUpperCase().slice(0,8).padEnd(8);
      const st = (a.status || 'idle').toUpperCase().slice(0,6);
      return `<div class="panel-row">${dot} ${name} <span class="val" style="font-size:9px">${st}</span></div>`;
    }).join('');
  } catch(e) {}
}
fetchAgents();
setInterval(fetchAgents, 30*1000);

// ═══════════════ WEBSOCKET (Pi server) ═══════════════
function connectWS() {
  try {
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'reply') {
          setStatus('speaking');
          const bubble = document.createElement('div');
          bubble.className = 'bubble ai';
          dialogueZone.appendChild(bubble);
          while (dialogueZone.children.length > 4) dialogueZone.removeChild(dialogueZone.firstChild);
          typewriter(msg.text, bubble);
          setTimeout(() => setStatus('idle'), msg.text.length * 28 + 1200);
        } else if (msg.type === 'status') {
          setStatus(msg.state || 'idle');
        }
      } catch(e) {}
    };
    ws.onclose = () => setTimeout(connectWS, 3000);
    ws.onerror = () => ws.close();
  } catch(e) { setTimeout(connectWS, 5000); }
}
connectWS();
